name: Daily Cron

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  master-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Run /api/cron/master
        run: |
          status=$(curl -sS -o /tmp/cron_response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.viajeinteligencia.com/api/cron/master")
          echo "HTTP $status"
          cat /tmp/cron_response.txt | head -c 500
          echo ""
          [ "$status" = "200" ] || exit 1
