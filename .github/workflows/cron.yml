name: Daily Cron

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  master-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Run /api/cron/master
        run: |
          status=$(curl -sS -o /tmp/cron_response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Host: www.viajeinteligencia.com" \
            "http://178.105.80.193:3000/api/cron/master")
          echo "HTTP $status"
          cat /tmp/cron_response.txt | head -c 500
          echo ""
          # Accept 200 (sync) or 202 (async) as success
          [ "$status" = "200" ] || [ "$status" = "202" ] || exit 1
