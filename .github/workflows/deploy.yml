name: Deploy to Hetzner
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://nczkvsnuafkwtmgokiuo.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jemt2c251YWZrd3RtZ29raXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjYwNzQsImV4cCI6MjA5MjAwMjA3NH0.tTzLjRcnBGZElppHIPz-igNgImY3t6og9lG35TjkVzs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate daily changelog
        run: |
          SINCE=$(date -u -d '06:00 UTC' '+%Y-%m-%d %H:%M')
          git log --since="$SINCE" --format="- \`%h\` %s" > CAMBIOS_HOY.md
          echo -e "\n---\nGenerado: $(date -u '+%Y-%m-%d %H:%M UTC') | Periodo: desde $SINCE" >> CAMBIOS_HOY.md
          echo "✅ CAMBIOS_HOY.md generado ($(wc -l < CAMBIOS_HOY.md) líneas)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install sharp for linux-x64
        run: npm install sharp --os=linux --cpu=x64

      - name: Build production
        run: npm run build

      - name: Deploy to Hetzner
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_PORT: '22'
          SSH_USER: 'deploy'
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts

          RSYNC_RSH="ssh -p $SSH_PORT" rsync -az --delete \
            --exclude '.git' \
            --exclude '.env*' \
            --exclude 'logs' \
            --exclude 'node_modules' \
            ./ $SSH_USER@$SSH_HOST:/var/www/viajeinteligencia/

          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST << 'ENDSSH'
            set -e
            cd /var/www/viajeinteligencia
            pm2 delete viajeinteligencia || true
            pm2 start ecosystem.config.cjs --only viajeinteligencia --update-env
            sleep 10
            pm2 save
            echo "=== Deploy complete ==="
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -sSf -o /dev/null -w "%{http_code}" https://www.viajeinteligencia.com/api/health 2>/dev/null || echo "000")
          echo "Health: $STATUS"

      - name: Verificar sitemap
        run: |
          URLS=$(curl -s https://www.viajeinteligencia.com/sitemap.xml | grep -c "<loc>" || echo "0")
          echo "Sitemap URLs: $URLS"
          if [ "$URLS" -lt 10 ]; then
            echo "❌ Sitemap roto: $URLS URLs"
            exit 1
          fi
          echo "✅ Sitemap OK: $URLS URLs"

      - name: Notificar IndexNow
        run: |
          RESP=$(curl -s -X POST \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            https://www.viajeinteligencia.com/api/indexnow)
          echo "IndexNow: $RESP"
