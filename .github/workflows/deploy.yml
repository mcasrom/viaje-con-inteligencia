name: Deploy to Hetzner
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for changelog

      - name: Generate daily changelog
        run: |
          SINCE=$(date -u -d '06:00 UTC' '+%Y-%m-%d %H:%M')
          git log --since="$SINCE" --format="- \`%h\` %s" > CAMBIOS_HOY.md
          echo -e "\n---\nGenerado: $(date -u '+%Y-%m-%d %H:%M UTC') | Periodo: desde $SINCE" >> CAMBIOS_HOY.md
          echo "✅ CAMBIOS_HOY.md generado ($(wc -l < CAMBIOS_HOY.md) líneas)"

      - name: Deploy to Hetzner
        env:
          SSH_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_PORT: '22'
          SSH_USER: 'deploy'
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts
          RSYNC_RSH="ssh -p $SSH_PORT" rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.env*' \
            --exclude 'logs' \
            ./ $SSH_USER@$SSH_HOST:/var/www/viajeinteligencia/
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST << ENDSSH
            set -e
            cd /var/www/viajeinteligencia
            # Write Cloudflare env vars to .env.production (preserve existing if any)
            touch .env.production
            grep -q '^CLOUDFLARE_API_TOKEN=' .env.production && \
              sed -i 's|^CLOUDFLARE_API_TOKEN=.*|CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN|' .env.production || \
              echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> .env.production
            grep -q '^CLOUDFLARE_ZONE_ID=' .env.production && \
              sed -i 's|^CLOUDFLARE_ZONE_ID=.*|CLOUDFLARE_ZONE_ID=$CLOUDFLARE_ZONE_ID|' .env.production || \
              echo "CLOUDFLARE_ZONE_ID=$CLOUDFLARE_ZONE_ID" >> .env.production
            if ! swapon --show | grep -q /swapfile; then
              fallocate -l 2G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile
              echo "Swap created"
            fi
            export NODE_OPTIONS="--max-old-space-size=1536"
            npm install --omit=dev
            npm run build
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -sSf -o /dev/null -w "%{http_code}" https://www.viajeinteligencia.com/api/health 2>/dev/null || echo "000")
          echo "Health: $STATUS"

      - name: Verificar sitemap
        run: |
          URLS=$(curl -s https://www.viajeinteligencia.com/sitemap.xml | grep -c "<loc>" || echo "0")
          echo "Sitemap URLs: $URLS"
          if [ "$URLS" -lt 10 ]; then
            echo "❌ Sitemap roto: $URLS URLs"
            exit 1
          fi
          echo "✅ Sitemap OK: $URLS URLs"

      - name: Notificar IndexNow
        run: |
          RESP=$(curl -s -X POST \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            https://www.viajeinteligencia.com/api/indexnow)
          echo "IndexNow: $RESP"
