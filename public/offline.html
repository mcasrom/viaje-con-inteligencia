<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión - Viaje con Inteligencia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #94a3b8; margin-bottom: 1.5rem; }
    .btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
    .info {
      margin-top: 2rem;
      padding: 1rem;
      background: #1e293b;
      border-radius: 0.5rem;
      max-width: 300px;
    }
    .info h2 { font-size: 1rem; margin-bottom: 0.5rem; color: #fbbf24; }
    .info p { font-size: 0.875rem; margin: 0; }
  </style>
</head>
<body>
  <div class="icon">✈️</div>
  <h1>Sin conexión</h1>
  <p>No tienes internet en este momento.</p>
  <a href="/" class="btn">Reintentar</a>
  <div class="info">
    <h2>💡 Datos guardados</h2>
    <p>Algunos datos de países pueden estar disponibles sin conexión.</p>
  </div>
</body>
</html>
